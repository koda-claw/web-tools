name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.version=$TAG" -o dist/web-tools-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.version=$TAG" -o dist/web-tools-darwin-amd64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.version=$TAG" -o dist/web-tools-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=$TAG" -o dist/web-tools-windows-amd64.exe .

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
